<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamp Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="login-page">

    <input type="checkbox" id="lamp-trigger">

    <div class="main-wrapper">
        <div class="lamp-unit">
            <div class="lamp-top"></div>
            <label for="lamp-trigger" class="lamp-rope"></label>
            <div class="light-beam"></div>
        </div>

        <div class="login-box">
            <h2>LOGIN</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="user-email" placeholder="Enter Ishaan's Gmail" required>
                </div>
                <div class="input-group">
                    <input type="password" id="user-pass" placeholder="Enter Password" required>
                </div>
                
                <button type="submit" class="login-btn">SIGN IN</button>
            </form>
            <p id="error-msg" style="color: #ff4d4d; margin-top: 10px; font-size: 14px; display: none;">Error: Gmail must contain 'ishaan' and correct password!</p>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Page reload nahi hoga

        var email = document.getElementById('user-email').value.toLowerCase();
        var pass = document.getElementById('user-pass').value;
        var error = document.getElementById('error-msg');

        // VALIDATION LOGIC:
        // 1. Email mein "ishaan" hona chahiye
        // 2. Email "@gmail.com" par khatam honi chahiye
        // 3. Password "1234" hona chahiye (aap ise badal sakte hain)
        
        if (email.includes("ishaan") && email.endsWith("@gmail.com") && pass === "1234") {
            window.location.href = "home.html"; 
        } else {
            error.style.display = "block";
            
            // Box shake effect for wrong entry
            var box = document.querySelector('.login-box');
            box.style.animation = "shake 0.2s ease-in-out 0s 2";
            setTimeout(() => { box.style.animation = ""; }, 400);
        }
    });
    </script>

</body>
</html>
